<!DOCTYPE html>
<!-- Historia 17: el cliente consulta el estado de su(s) membresia(s), sin login (ver README) -->
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <div class="row g-0">
            <div th:replace="~{general/fragmentos :: sidebar(${usuarioSeleccionado})}"/>
            <div class="col-md-9 col-lg-10">
                <div th:replace="~{general/fragmentos :: topbarSaludo(${usuarioSeleccionado})}"/>

                <section class="p-3">
                    <div class="card">
                        <div class="card-header">
                            <h4><i class="fa-solid fa-id-card"></i> [[#{plantilla.membresias}]]</h4>
                        </div>
                        <div class="card-body">
                            <div th:if="${suscripciones != null and !suscripciones.empty}">
                                <table class="table table-striped table-hover">
                                    <thead><tr>
                                            <th>[[#{suscripcion.plan}]]</th>
                                            <th>[[#{suscripcion.fechaInicio}]]</th>
                                            <th>[[#{suscripcion.fechaVencimiento}]]</th>
                                            <th>[[#{suscripcion.estado}]]</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="s : ${suscripciones}">
                                            <td>[[${s.membresia.nombrePlan}]]</td>
                                            <td>[[${s.fechaInicio}]]</td>
                                            <td>[[${s.fechaVencimiento}]]</td>
                                            <td>
                                                <span th:text="${estados.get(s.idClienteMembresia)}"
                                                      th:classappend="${estados.get(s.idClienteMembresia) == 'ACTIVA'} ? 'badge text-bg-success' : (${estados.get(s.idClienteMembresia) == 'VENCIDA'} ? 'badge text-bg-danger' : 'badge text-bg-secondary')">
                                                </span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="text-center p-2" th:if="${suscripciones == null or suscripciones.empty}">
                                <span>[[#{lista.vacia}]]</span></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <section th:replace="~{general/fragmentos :: mostrarToast}"/>
    </body>
</html>
