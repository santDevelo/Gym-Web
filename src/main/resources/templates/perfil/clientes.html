<!DOCTYPE html>
<!-- Historia 11: el entrenador consulta la lista de clientes asignados, sin login (ver README) -->
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <div class="row g-0">
            <div th:replace="~{general/fragmentos :: sidebar(${usuarioSeleccionado})}"/>
            <div class="col-md-9 col-lg-10">
                <div th:replace="~{general/fragmentos :: topbarSaludo(${usuarioSeleccionado})}"/>

                <section class="p-3">
                    <div class="card">
                        <div class="card-header">
                            <h4><i class="fa-solid fa-users"></i> [[#{plantilla.clientesAsignados}]]</h4>
                        </div>
                        <div class="card-body">
                            <div th:if="${clientesAsignados != null and !clientesAsignados.empty}">
                                <table class="table table-striped table-hover">
                                    <thead><tr>
                                            <th>[[#{usuario.nombre}]]</th>
                                            <th>[[#{usuario.apellidos}]]</th>
                                            <th>[[#{usuario.correo}]]</th>
                                            <th>[[#{usuario.telefono}]]</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${clientesAsignados}">
                                            <td>[[${c.nombre}]]</td>
                                            <td>[[${c.apellidos}]]</td>
                                            <td>[[${c.correo}]]</td>
                                            <td>[[${c.telefono}]]</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="text-center p-2" th:if="${clientesAsignados == null or clientesAsignados.empty}">
                                <span>[[#{lista.vacia}]]</span></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <section th:replace="~{general/fragmentos :: mostrarToast}"/>
    </body>
</html>
