<!DOCTYPE html>
<!-- Rutinas asignadas por este entrenador (historias 12/13), sin login (ver README) -->
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <div class="row g-0">
            <div th:replace="~{general/fragmentos :: sidebar(${usuarioSeleccionado})}"/>
            <div class="col-md-9 col-lg-10">
                <div th:replace="~{general/fragmentos :: topbarSaludo(${usuarioSeleccionado})}"/>

                <section class="p-3">
                    <div class="card">
                        <div class="card-header"><h5><i class="fa-solid fa-dumbbell"></i> [[#{sidebar.rutinasAsignadas}]]</h5></div>
                        <div class="card-body">
                            <div th:if="${rutinas != null and !rutinas.empty}">
                                <table class="table table-striped table-hover">
                                    <thead><tr>
                                            <th>[[#{rutina.nombre}]]</th>
                                            <th>[[#{rutina.cliente}]]</th>
                                            <th>[[#{rutina.fechaAsignacion}]]</th>
                                            <th>[[#{rutina.activo}]]</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="r : ${rutinas}">
                                            <td>[[${r.nombre}]]</td>
                                            <td>[[${r.cliente.nombre}]] [[${r.cliente.apellidos}]]</td>
                                            <td>[[${r.fechaAsignacion}]]</td>
                                            <td th:text="${r.activo} ? 'Activa':'Inactiva'"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="text-center p-2" th:if="${rutinas == null or rutinas.empty}">
                                <span>[[#{lista.vacia}]]</span></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <section th:replace="~{general/fragmentos :: mostrarToast}"/>
    </body>
</html>
