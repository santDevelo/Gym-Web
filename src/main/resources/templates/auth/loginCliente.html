<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <div class="login-purple-bg">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <div class="text-center mb-4">
                            <h1 class="text-white fw-bold"><i class="fas fa-dumbbell"></i> FitSystem</h1>
                            <p class="text-white-50">Inicia sesión en tu cuenta</p>
                        </div>
                        <div class="card login-card p-4">
                            <form method="POST" th:action="@{/login/cliente}">
                                <div class="mb-3">
                                    <label class="form-label">Usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                        <input type="text" name="username" class="form-control" placeholder="tu.usuario" required autofocus/>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                        <input type="password" name="password" class="form-control" placeholder="•••••" required/>
                                    </div>
                                </div>
                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-purple btn-lg">Iniciar Sesión</button>
                                </div>
                                <hr/>
                                <p class="text-center mb-1">¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a></p>
                                <p class="text-center mb-1">Si eres Entrenador <a th:href="@{/login/entrenador}">Pulsa aquí</a></p>
                                <p class="text-center mb-0"><a th:href="@{/}" class="text-muted">Volver</a></p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>
    </body>
</html>
