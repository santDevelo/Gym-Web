<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}">
    <title>Iniciar sesión - FitSystem</title>
</head>

<body class="login-bg">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="login-card">

            <div class="text-center mb-4">

                <i class="fas fa-dumbbell login-icon"></i>

                <h2 class="fw-bold text-purple">
                    Iniciar sesión
                </h2>

                <p class="text-muted">
                    Selecciona el tipo de usuario
                </p>

            </div>

            <div class="d-grid gap-3">

                <a th:href="@{/login/cliente}" class="btn btn-outline-purple">
                    Cliente
                </a>

                <a th:href="@{/login/entrenador}" class="btn btn-outline-purple">
                    Entrenador
                </a>

                <a th:href="@{/login/admin}" class="btn btn-outline-purple">
                    Administrador
                </a>

            </div>

            <hr>

            <div class="text-center">

                <p class="mb-2">
                    ¿No tienes una cuenta?
                </p>

                <a th:href="@{/registro}" class="btn btn-outline-purple w-100">
                    Crear cuenta
                </a>

            </div>

            <div class="text-center mt-4">

                <a th:href="@{/acceso}" class="text-decoration-none text-purple">
                    ← Volver
                </a>

            </div>

        </div>

    </div>

</body>

</html>
