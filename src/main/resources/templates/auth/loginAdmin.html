<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}">
</head>

<body class="login-bg">

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="login-card">

        <div class="text-center mb-4">

            <i class="fas fa-dumbbell login-icon"></i>

            <h2 class="fw-bold text-purple">
                FitSystem
            </h2>

            <p class="text-muted">
                Inicia sesión como <strong>Administrador</strong>
            </p>

        </div>

        <form th:action="@{/login/admin}" method="post">

            <div class="mb-3">

                <label class="form-label">
                    Usuario
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Contraseña
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button class="btn btn-purple w-100">

                Iniciar sesión

            </button>

        </form>

        <div class="text-center mt-4">

            <small>
                ¿No tienes una cuenta?
            </small>

            <br>

            <a href="#">
                Registrarme
            </a>

        </div>

        <div class="text-center mt-3">

            <small>
                ¿Eres Cliente?
            </small>

            <br>

            <a th:href="@{/login/cliente}">
                Cambiar de acceso
            </a>

        </div>

        <div class="text-center mt-3">

            <small>
                ¿Eres Entrenador?
            </small>

            <br>

            <a th:href="@{/login/entrenador}">
                Cambiar de acceso
            </a>

        </div>

        <div class="text-center mt-4">

            <a th:href="@{/login}">
                ← Volver
            </a>

        </div>

    </div>

</div>

</body>

</html>
