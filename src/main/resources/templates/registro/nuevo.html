<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <section class="p-3">
            <div class="row justify-content-center align-items-center g-4">
                <div class="col-md-5">
                    <h1 class="fw-bold text-purple"><i class="fas fa-dumbbell"></i> FitSystem</h1>
                    <p class="text-muted mb-4">Crea un usuario para continuar</p>
                    <form method="POST" th:action="@{/registro/guardar}" class="was-validated" enctype="multipart/form-data">
                        <div class="login-card-purple p-4">
                            <div class="mb-3">
                                <label>Nombre</label>
                                <input type="text" class="form-control" name="nombre" maxlength="50" required/>
                            </div>
                            <div class="mb-3">
                                <label>Apellidos</label>
                                <input type="text" class="form-control" name="apellidos" maxlength="80" required/>
                            </div>
                            <div class="mb-3">
                                <label>Teléfono</label>
                                <input type="text" class="form-control" name="telefono" maxlength="20"/>
                            </div>
                            <div class="mb-3">
                                <label>Correo electrónico</label>
                                <input type="email" class="form-control" name="correo" maxlength="100" required/>
                            </div>
                            <div class="mb-3">
                                <label>Usuario</label>
                                <input type="text" class="form-control" name="username" maxlength="30" required/>
                            </div>
                            <div class="mb-3">
                                <label>Crear Contraseña</label>
                                <input type="password" class="form-control" name="password" maxlength="100" required/>
                            </div>
                            <div class="mb-3">
                                <label>Foto de Perfil</label>
                                <input type="file" name="imagenFile" onchange="mostrarImagen(this);" class="form-control"/>
                                <img id="blah" src="#" alt="foto de perfil" height="120" class="mt-2 rounded"/>
                            </div>
                            <div class="d-grid mb-2">
                                <button type="submit" class="btn btn-light fw-bold">
                                    <i class="fas fa-check"></i> Crear Cuenta</button>
                            </div>
                            <p class="text-center mb-0"><a th:href="@{/}" class="text-white">Volver</a></p>
                        </div>
                    </form>
                </div>
                <div class="col-md-5 d-none d-md-block">
                    <div class="login-split-img" style="background-image:url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=900&amp;q=80');"></div>
                    <h4 class="text-center mt-3">Comienza el cambio hoy</h4>
                </div>
            </div>
        </section>

        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
