spring.application.name=fitsystem
#para definir el puerto donde "escuchara" el servidor
server.port=8082

#Para definir el formato de despliegue de fecha/hora del log en la consola
logging.pattern.dateformat=hh:mm

#Para eliminar mensajes invasivos de Spring
spring.main.banner-mode=off

#En desarrollo el "cache" del servidor (false), en produccion "true"
spring.thymeleaf.cache=false

#Conexion local a la BD fitsystem en MySQL (crear la BD con sql/fitsystem-schema.sql)
spring.datasource.url=jdbc:mysql://localhost:3306/fitsystem

#Usuario y clave: NUNCA credenciales reales en texto plano en el repositorio.
#El valor por defecto es el mismo placeholder de sql/fitsystem-schema.sql (CAMBIAR_esta_clave123);
#para usar otra clave en tu MySQL local, define la variable de entorno DB_PASSWORD antes de ejecutar.
spring.datasource.username=usuario_fitsystem
spring.datasource.password=${DB_PASSWORD:CAMBIAR_esta_clave123}

#Driver y plataforma de comunicacion
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#mostrar informacion en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

#Firebase Storage: para la foto de perfil de Usuario.
#El .json de credenciales (src/main/resources/firebase/...) esta excluido de git via .gitignore.
firebase.bucket.name=fitsystem-c876c.firebasestorage.app
firebase.storage.path=fitsystem
firebase.json.path=firebase
firebase.json.file=fitsystem-c876c-firebase-adminsdk-fbsvc-4091d316a3.json
